<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vasos Decorativos</title>

<style>
/* RESET */
* { margin:0; padding:0; box-sizing:border-box; }

/* PÁGINA */
body {
    font-family:'Segoe UI', sans-serif;
    background:#0c0c0c;
    color:white;
    filter:grayscale(100%);
    animation:vida 2s forwards;
    overflow-x:hidden;
}

@keyframes vida {
    0%{filter:grayscale(100%);}
    100%{filter:grayscale(0%);}
}

/* VAGALUMES NEON */
.vagalume {
    position:fixed;
    width:8px;
    height:8px;
    background:#7cff9e;
    border-radius:50%;
    opacity:0.6;
    box-shadow: 0 0 15px 5px #7cff9e; /* Efeito Neon */
    animation:subir linear infinite;
    pointer-events: none;
    z-index: 1;
}

@keyframes subir {
    0%{ transform:translateY(100vh) translateX(0); opacity:0; }
    50%{ opacity:0.8; }
    100%{ transform:translateY(-10vh) translateX(60px); opacity:0; }
}

/* BOTÃO VOLTAR */
.voltar {
    position:absolute;
    top:20px; left:20px;
    text-decoration:none;
    color:#aaa;
    font-size:12px;
    padding:8px 15px;
    border-radius:20px;
    background:#1a1a1a;
    transition:0.3s;
    z-index:10;
}
.voltar:hover { color:#7cff9e; background:#222; }

/* HEADER */
header { text-align:center; padding:80px 20px 40px; }
header h1 {
    font-size: clamp(30px, 8vw, 42px);
    margin-bottom:10px;
    background:linear-gradient(90deg,#ffffff,#7cff9e,#4fd1ff);
    background-size:300%;
    -webkit-background-clip:text;
    color:transparent;
    animation:corTitulo 6s linear infinite;
}

/* GRID RESPONSIVO */
.produtos {
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background:#161616;
    padding:20px;
    border-radius:20px;
    text-align:center;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    transition:0.4s;
    border: 1px solid #222;
}
.card:hover { transform:translateY(-5px); border-color: #7cff9e33; }

.card img {
    width:100%; height:200px;
    object-fit:cover;
    border-radius: 12px;
    margin-bottom:15px;
    filter:grayscale(100%);
    transition:0.6s;
}
.card:hover img { filter:grayscale(0%); }

.card h2 { font-size:18px; margin-bottom:10px; color:#fff; }
.desc { font-size:13px; color:#888; margin-bottom:15px; }
.preco { font-size:18px; font-weight:bold; color:#7cff9e; margin-bottom:15px; }

.botao {
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:12px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
}
.botao:hover { background:#128c7e; transform:scale(1.02); }

/* AJUSTE PARA CELULAR */
@media(max-width: 480px) {
    .produtos { grid-template-columns: 1fr; padding: 15px; }
    .card { min-height: auto; }
}
</style>
</head>
<body>

<a class="voltar" href="produtos.html">← Voltar</a>

<div class="vagalume" style="left:10%; animation-duration:15s;"></div>
<div class="vagalume" style="left:30%; animation-duration:12s;"></div>
<div class="vagalume" style="left:50%; animation-duration:18s;"></div>
<div class="vagalume" style="left:70%; animation-duration:14s;"></div>
<div class="vagalume" style="left:90%; animation-duration:16s;"></div>

<header>
    <h1>Vasos Decorativos 3D</h1>
    <p>Pequenos detalhes que dão vida ao ambiente.</p>
</header>

<section class="produtos">
    <div class="card">
        <img src="imagens/objeto3d2.webp" alt="Vaso">
        <h2>Vaso Decorativo</h2>
        <p class="desc">Design moderno que transforma qualquer ambiente.</p>
        <div class="preco">R$ 120,00</div>
        <a class="botao" href="https://wa.me/5599999999999" target="_blank">Comprar no WhatsApp</a>
    </div>
    
    </section>

</body>
</html>
