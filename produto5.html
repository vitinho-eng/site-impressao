<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Last of Us - Quarantine Zone</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Courier New, monospace;
  background:black;
  color:white;
  overflow-x:hidden;
}

.video-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter:brightness(0.35);
}

.wall{
  position:relative;
  min-height:100vh;
  padding:150px 20px 50px 20px;
}

.qz{
  position:absolute;
  top:20px;
  left:60px;
  border:2px solid #c8bfa4;
  padding:10px 16px;
  letter-spacing:4px;
  color:#c8bfa4;
  font-family: 'Permanent Marker', cursive;
  text-shadow: 1px 1px 3px black;
}

.voltar-global{
  position:absolute;
  top:20px;
  right:20px;
  background:#c8bfa4;
  color:black;
  font-weight:bold;
  padding:8px 14px;
  border:none;
  cursor:pointer;
  box-shadow:0 0 10px #c8bfa4, 0 0 20px #c8bfa4, 0 0 30px #c8bfa4 inset;
  z-index:5;
  transition:0.3s;
  font-size:14px;
  border-radius:5px;
  animation: neon 1.5s infinite alternate;
}
.voltar-global:hover{
  transform:scale(1.05);
}

@keyframes neon {
  0% {box-shadow:0 0 5px #c8bfa4, 0 0 10px #c8bfa4, 0 0 15px #c8bfa4 inset; opacity:0.8;}
  50% {box-shadow:0 0 15px #fffa7f, 0 0 25px #fffa7f, 0 0 35px #fffa7f inset; opacity:1;}
  100% {box-shadow:0 0 5px #c8bfa4, 0 0 10px #c8bfa4, 0 0 15px #c8bfa4 inset; opacity:0.8;}
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(230px,1fr));
  grid-gap:50px;
  justify-items:center;
}

.personagem{
  width:230px;
  cursor:pointer;
  text-align:center;
  transition: transform 0.3s ease;
}

.personagem img{
  width:100%;
  border-radius:8px;
  box-shadow:0 5px 25px rgba(0,0,0,0.7);
  margin-bottom:8px;
  transition: transform 0.3s ease, filter 0.3s ease;
}
.personagem:hover img{
  transform: scale(1.08);
  filter: brightness(1.1) drop-shadow(0 0 8px rgba(200, 191, 164, 0.6));
}

.label{
  font-size:16px;
  color:#f4f4f4;
  font-family: 'Permanent Marker', cursive;
  text-shadow:1px 1px 2px black;
  margin-bottom:8px;
  transition: color 0.3s ease;
}

.personagem:hover .label{
  color:#ffdd57;
}

/* Modal */
.modal{
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.95);
  justify-content:center;
  align-items:center;
  z-index:10;
  opacity:0;
  transform:scale(0.8);
  transition:all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  backdrop-filter: blur(2px);
  overflow-y:auto;
  padding:20px 0;
}

.modal.aberto{
  display:flex;
  opacity:1;
  transform:scale(1);
}

.produto{
  background: linear-gradient(135deg, #3d3d3d 0%, #2c2b27 50%, #1a1a1a 100%);
  color:white;
  padding:30px;
  width:380px;
  max-height:90vh;
  overflow-y:auto;
  text-align:center;
  box-shadow:
    0 20px 60px rgba(0,0,0,0.95),
    0 0 40px rgba(200, 191, 164, 0.3),
    inset 0 1px 0 rgba(255,255,255,0.1);
  position:relative;
  border-radius:10px;
  animation: popup 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  font-family: 'Permanent Marker', cursive;
  border:2px solid #c8bfa4;
}

.produto::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,221,87,0.1), transparent 50%);
  border-radius: 10px;
  pointer-events: none;
}

.produto img{
  width:260px;
  margin-bottom:15px;
  border-radius:5px;
  box-shadow:0 5px 20px rgba(0,0,0,0.5), 0 0 15px rgba(200, 191, 164, 0.2);
  transition: transform 0.3s ease, filter 0.3s ease;
}

.produto img:hover {
  transform: scale(1.05);
  filter: brightness(1.1);
}

.produto h2{
  margin:10px 0 15px 0;
  color:#ffdd57;
  text-shadow:2px 2px 4px rgba(0,0,0,0.8);
  font-size: 24px;
  letter-spacing: 2px;
}

.produto p{
  font-size:14px;
  line-height:1.4em;
  margin:5px 0;
  color: #e8e8e8;
}

.produto-descricao {
  font-size: 13px;
  color: #d0d0d0;
  margin: 12px 0;
  font-style: italic;
  line-height: 1.5;
}

.produto-preco {
  font-size: 20px;
  color: #ffdd57;
  font-weight: bold;
  margin: 15px 0;
  text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
}

.detalhes-container {
  background: rgba(0, 0, 0, 0.3);
  border: 1px solid #c8bfa4;
  border-radius: 6px;
  padding: 15px;
  margin: 15px 0;
  text-align: left;
}

.detalhes-titulo {
  color: #ffdd57;
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid #c8bfa4;
  padding-bottom: 8px;
}

.detalhe-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid rgba(200, 191, 164, 0.2);
  font-size: 13px;
}

.detalhe-item:last-child { border-bottom: none; }
.detalhe-label { color: #c8bfa4; font-weight: bold; }
.detalhe-valor { color: #e8e8e8; text-align: right; }

.produto button{
  margin-top:15px;
  padding:12px 22px;
  border:none;
  background: linear-gradient(135deg, #556b2f 0%, #6b8e23 100%);
  color:white;
  cursor:pointer;
  font-weight:bold;
  transition: all 0.3s ease;
  box-shadow:0 5px 15px rgba(0,0,0,0.6), 0 0 10px rgba(107, 142, 35, 0.4);
  border-radius: 5px;
  font-family: 'Permanent Marker', cursive;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
  width: 100%;
}

.produto button::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: rgba(255,255,255,0.2);
  transition: left 0.3s ease;
}

.produto button:hover {
  background: linear-gradient(135deg, #6b8e23 0%, #7ba428 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.7), 0 0 15px rgba(107, 142, 35, 0.6);
}

.produto button:hover::before { left: 100%; }
.produto button:active { transform: translateY(0); }

.close{
  position:absolute;
  top:10px; right:10px;
  cursor:pointer;
  font-weight:bold;
  font-size:24px;
  color: #c8bfa4;
  transition: all 0.3s ease;
  width: 30px; height: 30px;
  display: flex;
  align-items: center; justify-content: center;
  border-radius: 50%;
  z-index: 1;
}

.close:hover {
  background: rgba(200, 191, 164, 0.2);
  transform: rotate(90deg);
  color: #ffdd57;
}

@keyframes popup{
  0%  { transform:scale(0.8) rotateX(-10deg); opacity:0; }
  100%{ transform:scale(1) rotateX(0); opacity:1; }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal.aberto { animation: fadeIn 0.3s ease-out; }

/* ═══════════════════════════════
   RESPONSIVO CELULAR — só isso
═══════════════════════════════ */
@media (max-width: 600px) {

  /* header: empilha QZ em cima e botão abaixo */
  .qz {
    position: fixed;
    top: 10px; left: 10px; right: auto;
    font-size: 11px;
    padding: 7px 10px;
    letter-spacing: 2px;
    z-index: 20;
  }

  .voltar-global {
    position: fixed;
    top: 10px; right: 10px;
    font-size: 11px;
    padding: 7px 10px;
    z-index: 20;
  }

  /* grid: 2 colunas, menor gap */
  .wall { padding: 80px 10px 40px; }

  .grid {
    grid-template-columns: repeat(2, 1fr);
    grid-gap: 16px;
  }

  /* personagem ocupa coluna inteira */
  .personagem { width: 100%; }

  /* modal ocupa tela toda, sobe da base */
  .modal {
    align-items: flex-end;
    padding: 0;
  }

  .produto {
    width: 100%;
    max-width: 100%;
    max-height: 85vh;
    border-radius: 16px 16px 0 0;
    padding: 20px 16px 28px;
  }

  .produto img {
    width: 100%;
    max-width: 200px;
  }
}
</style>
</head>
<body>

<button class="voltar-global" onclick="window.location.href='produtos.html'">
  ← Todos os produtos
</button>

<video autoplay muted loop playsinline class="video-bg">
  <source src="imagens/thelast2.mp4" type="video/mp4">
</video>

<section class="wall">
  <div class="qz">QUARANTINE ZONE</div>
  <div class="grid" id="grid"></div>
</section>

<div class="modal" id="modal">
  <div class="produto">
    <span class="close" onclick="fechar()">✕</span>
    <div id="conteudo"></div>
  </div>
</div>

<script>
const produtos = [
  { id:"joel",      nome:"Joel",      identidade:"imagens/joel22.webp",   produto:"imagens/joel.png",            descricao:"Action Figure detalhada", preco:"R$149", dimensoes:"15cm", peso:"180g", material:"Resina Premium", acabamento:"Pintura Manual" },
  { id:"ellie",     nome:"Ellie",     identidade:"imagens/ellie2.webp",   produto:"imagens/ellie.jpg",           descricao:"Action Figure detalhada", preco:"R$149", dimensoes:"14cm", peso:"165g", material:"Resina Premium", acabamento:"Pintura Manual" },
  { id:"estalador", nome:"Estalador", identidade:"imagens/estala.webp",   produto:"imagens/estalador.webp",      descricao:"Infectado icônico",       preco:"R$149", dimensoes:"13cm", peso:"175g", material:"Resina Premium", acabamento:"Pintura Manual + Efeitos" },
  { id:"tommy",     nome:"Tommy",     identidade:"imagens/tommy.jpg",     produto:"imagens/tommy_produto.webp",  descricao:"Ally sobrevivente",       preco:"R$129", dimensoes:"14cm", peso:"160g", material:"Resina Premium", acabamento:"Pintura Manual" },
  { id:"clicker",   nome:"Clicker",   identidade:"imagens/dina.webp",     produto:"imagens/clicker_produto.webp",descricao:"Infectado avançado",      preco:"R$159", dimensoes:"16cm", peso:"200g", material:"Resina Premium", acabamento:"Pintura Manual + Textura" },
  { id:"abby",      nome:"Abby",      identidade:"imagens/abby.webp",     produto:"imagens/abby_produto.webp",   descricao:"Action Figure detalhada", preco:"R$159", dimensoes:"15cm", peso:"185g", material:"Resina Premium", acabamento:"Pintura Manual" },
  { id:"maria",     nome:"Maria",     identidade:"imagens/mariat.webp",   produto:"imagens/abby_produto.webp",   descricao:"Action Figure detalhada", preco:"R$159", dimensoes:"15cm", peso:"185g", material:"Resina Premium", acabamento:"Pintura Manual" },
  { id:"tess",      nome:"Tess",      identidade:"imagens/tess.webp",     produto:"imagens/abby_produto.webp",   descricao:"Action Figure detalhada", preco:"R$159", dimensoes:"15cm", peso:"185g", material:"Resina Premium", acabamento:"Pintura Manual" }
];

const grid = document.getElementById("grid");

produtos.forEach(p => {
  const div = document.createElement("div");
  div.className = "personagem";
  div.innerHTML = `
    <img src="${p.identidade}" alt="${p.nome}">
    <div class="label">${p.nome.toUpperCase()}</div>
  `;
  div.onclick = () => abrir(p.id);
  grid.appendChild(div);
});

function abrir(id){
  const produto = produtos.find(p => p.id === id);
  const c = document.getElementById("conteudo");
  if(produto){
    c.innerHTML = `
      <h2>${produto.nome}</h2>
      <img src="${produto.produto}" alt="${produto.nome} Produto">
      <p class="produto-descricao">${produto.descricao}</p>
      <div class="detalhes-container">
        <div class="detalhes-titulo">📋 Especificações</div>
        <div class="detalhe-item"><span class="detalhe-label">Altura:</span><span class="detalhe-valor">${produto.dimensoes}</span></div>
        <div class="detalhe-item"><span class="detalhe-label">Peso:</span><span class="detalhe-valor">${produto.peso}</span></div>
        <div class="detalhe-item"><span class="detalhe-label">Material:</span><span class="detalhe-valor">${produto.material}</span></div>
        <div class="detalhe-item"><span class="detalhe-label">Acabamento:</span><span class="detalhe-valor">${produto.acabamento}</span></div>
      </div>
      <div class="produto-preco">${produto.preco}</div>
      <button onclick="window.open('https://wa.me/5511999999999?text=Quero+comprar+${encodeURIComponent(produto.nome)}+-+${produto.dimensoes}+-+${produto.preco}','_blank')">
        🌿 Levar para o abrigo
      </button>
    `;
    document.getElementById("modal").classList.add("aberto");
  }
}

function fechar(){
  document.getElementById("modal").classList.remove("aberto");
}

document.getElementById("modal").addEventListener("click", function(event){
  if(event.target === this) fechar();
});

document.addEventListener("keydown", e => { if(e.key === "Escape") fechar(); });
</script>

</body>
</html>
