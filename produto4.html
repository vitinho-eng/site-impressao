<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Action Figures 3D - Dark Fantasy</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #140021, #050008 70%);
  color: #f5f5f5;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, rgba(140,0,255,.07), rgba(60,0,120,.07));
  animation: nevoa 20s linear infinite alternate;
  z-index: 0;
}
@keyframes nevoa {
  from { transform: translate(0,0); }
  to   { transform: translate(-400px,-400px); }
}

canvas {
  position: fixed; top: 0; left: 0;
  pointer-events: none; z-index: 0;
}

/* ── CONTAINER ──────────────────── */
.container {
  position: relative; z-index: 2;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 40px 20px;
}

/* ── CARD ───────────────────────── */
.produto-card {
  width: 100%;
  max-width: 1100px;
  display: flex;
  gap: 60px;
  padding: 50px;
  border-radius: 25px;
  background: rgba(20,0,40,.85);
  border: 1px solid rgba(180,0,255,.4);
  box-shadow:
    0 0 40px rgba(140,0,255,.5),
    0 0 80px rgba(100,0,200,.3),
    0 40px 80px rgba(0,0,0,.8);
}

/* ── GALERIA ────────────────────── */
.galeria {
  position: relative;
  flex-shrink: 0;
  width: 400px;
  height: 400px;
}

.slide {
  position: absolute;
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 18px;
  opacity: 0;
  transition: .4s ease;
  box-shadow: 0 0 30px rgba(160,0,255,.5);
}
.slide.active { opacity: 1; }

/* ── NAV SLIDER ─────────────────── */
.nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,.7);
  border: 1px solid #a200ff;
  color: #d580ff;
  font-size: 20px;
  width: 42px; height: 42px;
  border-radius: 50%;
  cursor: pointer;
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
  transition: .25s;
  /* toque fácil no mobile */
  touch-action: manipulation;
}
.nav:hover { background: #a200ff; color: #000; box-shadow: 0 0 20px #c84dff; }
.prev { left: -18px; }
.next { right: -18px; }

/* ── INFO ───────────────────────── */
.info {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
  flex: 1;
  min-width: 0;
}

.info h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(24px, 4vw, 42px);
  color: #d580ff;
  text-shadow: 0 0 20px rgba(180,0,255,.8);
  line-height: 1.2;
}

.info p {
  font-size: clamp(13px, 1.6vw, 15px);
  color: rgba(255,255,255,.7);
  line-height: 1.7;
}

.preco {
  font-size: clamp(26px, 4vw, 34px);
  font-weight: 700;
  color: #e0aaff;
}

/* ── BOTÃO COMPRA ───────────────── */
.botao-comprar {
  display: block;
  padding: 15px;
  border: none;
  border-radius: 12px;
  background: linear-gradient(90deg, #6a00f4, #b100ff);
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: clamp(13px, 1.5vw, 15px);
  font-weight: 600;
  text-align: center;
  text-decoration: none;
  cursor: pointer;
  transition: .3s;
}
.botao-comprar:hover {
  box-shadow: 0 0 30px #c84dff;
  transform: scale(1.04);
}

/* ── BOTÃO VOLTAR ───────────────── */
.voltar-interno {
  text-align: center;
  color: #c77dff;
  text-decoration: none;
  font-weight: 500;
  font-size: 14px;
  transition: .3s;
}
.voltar-interno:hover { color: white; text-shadow: 0 0 10px #b100ff; }

/* ── THUMBNAILS ─────────────────── */
.thumbs {
  display: flex;
  gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
  justify-content: center;
}
.thumb {
  width: 56px; height: 56px;
  object-fit: cover;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  opacity: .55;
  transition: .25s;
}
.thumb.active, .thumb:hover {
  border-color: #a200ff;
  opacity: 1;
  box-shadow: 0 0 10px #c84dff;
}

/* ── RESPONSIVO ─────────────────── */

/* tablet */
@media (max-width: 860px) {
  .produto-card {
    flex-direction: column;
    align-items: center;
    padding: 28px 20px;
    gap: 28px;
    text-align: center;
  }
  .galeria {
    width: min(340px, 85vw);
    height: min(340px, 85vw);
  }
  /* botões dentro da galeria, não para fora */
  .prev { left: 8px; }
  .next { right: 8px; }
}

/* celular */
@media (max-width: 540px) {
  body { background: #0a0012; } /* evita borda roxa cortada */

  .container {
    padding: 16px 12px;
    align-items: flex-start; /* sem espaço em branco no topo */
    min-height: auto;
  }

  .produto-card {
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 20px 14px 28px;
    gap: 20px;
    border-radius: 16px;
    /* sombra mais suave no mobile */
    box-shadow: 0 0 24px rgba(140,0,255,.4);
    /* garante que não ultrapassa a tela */
    width: 100%;
    max-width: 100%;
  }

  .galeria {
    /* ocupa largura total do card menos o padding */
    width: 100%;
    height: 0;
    padding-bottom: 100%; /* quadrado perfeito */
    position: relative;
  }

  .slide {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
  }

  /* botões ficam dentro, grandes o suficiente para toque */
  .nav {
    width: 40px; height: 40px;
    font-size: 16px;
    top: 50%; transform: translateY(-50%);
  }
  .prev { left: 8px; }
  .next { right: 8px; }

  .thumbs { gap: 6px; margin-top: 10px; }
  .thumb  { width: 52px; height: 52px; }

  .info { width: 100%; gap: 14px; }

  .botao-comprar {
    padding: 14px;
    font-size: 15px;
    border-radius: 10px;
  }
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">
  <div class="produto-card">

    <!-- GALERIA -->
    <div>
      <div class="galeria">
        <img src="imagens/miniaturas1.webp" class="slide active" alt="Miniatura 1">
        <img src="imagens/miniaturas2.webp" class="slide" alt="Miniatura 2">
        <img src="imagens/miniaturas3.webp" class="slide" alt="Miniatura 3">
        <img src="imagens/miniaturas4.png"  class="slide" alt="Miniatura 4">
        <button class="nav prev" aria-label="Anterior">&#10094;</button>
        <button class="nav next" aria-label="Próximo">&#10095;</button>
      </div>
      <!-- thumbnails clicáveis -->
      <div class="thumbs">
        <img src="imagens/miniaturas1.webp" class="thumb active" data-index="0" alt="">
        <img src="imagens/miniaturas2.webp" class="thumb"        data-index="1" alt="">
        <img src="imagens/miniaturas3.webp" class="thumb"        data-index="2" alt="">
        <img src="imagens/miniaturas4.png"  class="thumb"        data-index="3" alt="">
      </div>
    </div>

    <!-- INFO -->
    <div class="info">
      <h1>Relíquias Dark Fantasy 3D</h1>
      <p>Miniaturas místicas impressas em 3D, inspiradas em universos sombrios e lendas esquecidas.</p>
      <div class="preco">R$ 120,00</div>
      <a href="https://wa.me/5541991234567?text=Olá,%20quero%20comprar%20a%20Relíquias%20Dark%20Fantasy%203D"
         target="_blank" class="botao-comprar">
        Invocar via WhatsApp
      </a>
      <a href="produtos.html" class="voltar-interno">← Retornar ao Catálogo Arcano</a>
    </div>

  </div>
</div>

<script>
/* ── SLIDER ────────────────────── */
const slides = document.querySelectorAll('.slide');
const thumbs = document.querySelectorAll('.thumb');
let current = 0;

function goTo(index) {
  slides[current].classList.remove('active');
  thumbs[current].classList.remove('active');
  current = (index + slides.length) % slides.length;
  slides[current].classList.add('active');
  thumbs[current].classList.add('active');
}

document.querySelector('.next').addEventListener('click', () => goTo(current + 1));
document.querySelector('.prev').addEventListener('click', () => goTo(current - 1));
thumbs.forEach(t => t.addEventListener('click', () => goTo(+t.dataset.index)));

/* swipe mobile */
let touchStartX = 0;
document.querySelector('.galeria').addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.querySelector('.galeria').addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1);
});

/* ── PARTÍCULAS ────────────────── */
const canvas = document.getElementById('particles');
const ctx    = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const parts = Array.from({length:80}, () => ({
  x: Math.random() * canvas.width,
  y: Math.random() * canvas.height,
  size: Math.random() * 2.5,
  speed: Math.random() * .6 + .2
}));

(function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'rgba(180,0,255,.6)';
  parts.forEach(p => {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
    p.y += p.speed;
    if(p.y > canvas.height) { p.y = 0; p.x = Math.random() * canvas.width; }
  });
  requestAnimationFrame(animate);
})();
</script>

</body>
</html>
