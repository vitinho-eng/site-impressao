<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relíquias Dark Fantasy 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at center, #140021, #050008 70%);
  color: #f5f5f5;
  overflow-x: hidden;
  min-height: 100vh;
}

body::before {
  content: "";
  position: fixed; inset: 0;
  background: linear-gradient(45deg, rgba(140,0,255,.07), rgba(60,0,120,.07));
  animation: nevoa 20s linear infinite alternate;
  z-index: 0;
  pointer-events: none;
}
@keyframes nevoa {
  from { transform: translate(0,0); }
  to   { transform: translate(-200px,-200px); }
}

#particles {
  position: fixed; top:0; left:0;
  pointer-events: none; z-index: 0;
}

/* ── PAGE WRAPPER ─────────────── */
.page {
  position: relative; z-index: 2;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 30px 16px;
}

/* ── CARD ─────────────────────── */
.card {
  width: 100%;
  max-width: 1100px;
  background: rgba(20,0,40,.88);
  border: 1px solid rgba(180,0,255,.4);
  border-radius: 22px;
  box-shadow: 0 0 40px rgba(140,0,255,.4), 0 20px 60px rgba(0,0,0,.7);
  padding: 40px;
  display: flex;
  gap: 56px;
  align-items: center;
}

/* ── GALERIA ──────────────────── */
.galeria-wrap {
  flex-shrink: 0;
  width: 400px;
}

.galeria {
  position: relative;
  width: 100%;
  padding-bottom: 100%; /* quadrado */
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 0 28px rgba(160,0,255,.5);
}

.slide {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity .4s ease;
}
.slide.active { opacity: 1; }

.nav {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  z-index: 3;
  width: 40px; height: 40px;
  background: rgba(0,0,0,.7);
  border: 1px solid #a200ff;
  color: #d580ff;
  font-size: 18px;
  border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: .25s;
  touch-action: manipulation;
}
.nav:hover { background: #a200ff; color: #000; box-shadow: 0 0 16px #c84dff; }
.prev { left: 10px; }
.next { right: 10px; }

/* thumbnails */
.thumbs {
  display: flex; gap: 8px;
  margin-top: 12px;
  flex-wrap: wrap;
}
.thumb {
  width: 60px; height: 60px;
  object-fit: cover;
  border-radius: 8px;
  border: 2px solid transparent;
  cursor: pointer;
  opacity: .5;
  transition: .25s;
}
.thumb.active, .thumb:hover {
  border-color: #a200ff;
  opacity: 1;
  box-shadow: 0 0 10px #c84dff;
}

/* ── INFO ─────────────────────── */
.info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.info h1 {
  font-family: 'Cinzel', serif;
  font-size: clamp(26px, 3.5vw, 42px);
  color: #d580ff;
  text-shadow: 0 0 20px rgba(180,0,255,.8);
  line-height: 1.2;
}

.info p {
  font-size: 15px;
  color: rgba(255,255,255,.65);
  line-height: 1.7;
}

.preco {
  font-size: clamp(28px, 4vw, 36px);
  font-weight: 700;
  color: #e0aaff;
}

.btn-wpp {
  display: block;
  padding: 15px;
  background: linear-gradient(90deg, #6a00f4, #b100ff);
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 15px; font-weight: 600;
  text-align: center;
  text-decoration: none;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  transition: .3s;
}
.btn-wpp:hover {
  box-shadow: 0 0 28px #c84dff;
  transform: scale(1.03);
}

.btn-voltar {
  text-align: center;
  color: #c77dff;
  text-decoration: none;
  font-size: 14px; font-weight: 500;
  transition: .3s;
}
.btn-voltar:hover { color: #fff; text-shadow: 0 0 10px #b100ff; }

/* ══════════════════════════════════
   MOBILE — reescreve o layout
══════════════════════════════════ */
@media (max-width: 780px) {
  .page {
    padding: 16px 12px;
    align-items: flex-start;
  }

  .card {
    flex-direction: column;
    gap: 20px;
    padding: 20px 16px 28px;
    border-radius: 18px;
    text-align: center;
  }

  /* galeria ocupa largura total */
  .galeria-wrap { width: 100%; }

  .thumbs { justify-content: center; }
  .thumb  { width: 54px; height: 54px; }

  .info { align-items: center; }

  .btn-wpp { font-size: 16px; padding: 14px; }
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="page">
  <div class="card">

    <!-- GALERIA -->
    <div class="galeria-wrap">
      <div class="galeria" id="galeria">
        <img src="imagens/miniaturas1.webp" class="slide active" alt="Miniatura 1">
        <img src="imagens/miniaturas2.webp" class="slide" alt="Miniatura 2">
        <img src="imagens/miniaturas3.webp" class="slide" alt="Miniatura 3">
        <img src="imagens/miniaturas4.png"  class="slide" alt="Miniatura 4">
        <button class="nav prev">&#10094;</button>
        <button class="nav next">&#10095;</button>
      </div>
      <div class="thumbs">
        <img src="imagens/miniaturas1.webp" class="thumb active" data-i="0" alt="">
        <img src="imagens/miniaturas2.webp" class="thumb"        data-i="1" alt="">
        <img src="imagens/miniaturas3.webp" class="thumb"        data-i="2" alt="">
        <img src="imagens/miniaturas4.png"  class="thumb"        data-i="3" alt="">
      </div>
    </div>

    <!-- INFO -->
    <div class="info">
      <h1>Relíquias Dark Fantasy 3D</h1>
      <p>Miniaturas místicas impressas em 3D, inspiradas em universos sombrios e lendas esquecidas.</p>
      <div class="preco">R$ 120,00</div>
      <a class="btn-wpp"
         href="https://wa.me/5541991234567?text=Olá,%20quero%20comprar%20a%20Relíquias%20Dark%20Fantasy%203D"
         target="_blank">
        Invocar via WhatsApp
      </a>
      <a class="btn-voltar" href="produtos.html">← Retornar ao Catálogo Arcano</a>
    </div>

  </div>
</div>

<script>
/* ── SLIDER ──────────────────────────────── */
const slides = [...document.querySelectorAll('.slide')];
const thumbs = [...document.querySelectorAll('.thumb')];
let cur = 0;

function goTo(n) {
  slides[cur].classList.remove('active');
  thumbs[cur].classList.remove('active');
  cur = ((n % slides.length) + slides.length) % slides.length;
  slides[cur].classList.add('active');
  thumbs[cur].classList.add('active');
}

document.querySelector('.next').onclick = () => goTo(cur + 1);
document.querySelector('.prev').onclick = () => goTo(cur - 1);
thumbs.forEach(t => t.onclick = () => goTo(+t.dataset.i));

/* swipe */
let tx = 0;
const g = document.getElementById('galeria');
g.addEventListener('touchstart', e => tx = e.touches[0].clientX, {passive:true});
g.addEventListener('touchend',   e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) goTo(dx < 0 ? cur + 1 : cur - 1);
});

/* ── PARTÍCULAS ──────────────────────────── */
const cv  = document.getElementById('particles');
const ctx = cv.getContext('2d');
function resize() { cv.width = innerWidth; cv.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const pts = Array.from({length:70}, () => ({
  x: Math.random() * cv.width,
  y: Math.random() * cv.height,
  r: Math.random() * 2 + .5,
  s: Math.random() * .5 + .2
}));

(function loop() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.fillStyle = 'rgba(180,0,255,.55)';
  pts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    p.y += p.s;
    if (p.y > cv.height) { p.y = 0; p.x = Math.random() * cv.width; }
  });
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
