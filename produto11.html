<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forja de Hephesto | Arsenal Lendário</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --cor: #6fd6ff;
            --brilho: rgba(0, 191, 255, 0.4);
            --ouro-velho: #a58e4b;
            --transicao: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cinzel', serif;
            background: #000;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* BOTÃO VOLTAR - TEMÁTICA GOW */
        .btn-voltar {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            text-decoration: none;
            color: var(--ouro-velho);
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 14px;
            transition: var(--transicao);
            padding: 10px 15px;
            border: 1px solid transparent;
        }

        .btn-voltar i {
            font-size: 20px;
            filter: drop-shadow(0 0 5px var(--ouro-velho));
        }

        .btn-voltar:hover {
            color: #fff;
            text-shadow: 0 0 10px var(--ouro-velho);
            border-bottom: 1px solid var(--ouro-velho);
            transform: translateX(5px);
        }

        /* VIDEO DE FUNDO */
        .video-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
            opacity: 0.6;
        }

        .overlay-fundo {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, #000 100%);
            z-index: -1;
        }

        /* TÍTULO DA FORJA */
        .titulo-forja {
            text-align: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .titulo-forja h2 {
            font-family: 'Uncial Antiqua', serif;
            font-size: 14px;
            letter-spacing: 8px;
            color: var(--ouro-velho);
            text-transform: uppercase;
            opacity: 0.8;
        }

        .titulo-forja h1 {
            font-size: 50px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255,255,255,0.2), 0 0 40px var(--brilho);
            letter-spacing: 4px;
        }

        .menu-inventario {
            display: grid;
            grid-template-columns: 380px 1fr;
            width: 95%;
            max-width: 1300px;
            height: 75vh;
            gap: 25px;
            z-index: 5;
        }

        /* INVENTÁRIO */
        .lista-itens {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(165, 142, 75, 0.3);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.9);
            padding: 25px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            align-content: start;
        }

        /* CUSTOM SCROLLBAR PARA O INVENTÁRIO */
        .lista-itens::-webkit-scrollbar {
            width: 8px;
        }
        .lista-itens::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.5);
        }
        .lista-itens::-webkit-scrollbar-thumb {
            background: var(--ouro-velho);
            border-radius: 4px;
        }

        .item-slot {
            aspect-ratio: 1/1;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transicao);
            position: relative;
        }

        .item-slot img {
            width: 75%; height: 75%;
            object-fit: contain;
            filter: grayscale(1) opacity(0.4);
            transition: var(--transicao);
        }

        .item-slot:hover, .item-slot.active {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--cor);
            box-shadow: 0 0 20px var(--brilho);
        }

        .item-slot.active img, .item-slot:hover img {
            filter: grayscale(0) opacity(1);
            transform: scale(1.1);
        }

        /* PAINEL DE DETALHES */
        .detalhes-reliquia {
            background: rgba(5, 7, 10, 0.8);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(165, 142, 75, 0.3);
            padding: 50px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            position: relative;
        }

        .visual-container {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .circulo-ritual {
            position: absolute;
            width: 400px; height: 400px;
            border: 1px dashed var(--cor);
            border-radius: 50%;
            opacity: 0.2;
            animation: rodar 30s linear infinite;
        }

        @keyframes rodar { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #img-principal {
            max-width: 100%;
            z-index: 5;
            filter: drop-shadow(0 0 40px var(--brilho));
            animation: flutuar 4s ease-in-out infinite;
        }

        .info-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 40px;
        }

        h1#nome {
            font-family: 'Uncial Antiqua', serif;
            font-size: 40px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--brilho);
        }

        .stats-grid { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 4px; margin-bottom: 20px; }
        .bar-bg { height: 4px; background: #000; margin-top: 5px; }
        .bar-fill { height: 100%; background: var(--cor); box-shadow: 0 0 10px var(--cor); transition: 1s; }

        .btn-buy {
            background: transparent;
            border: 1px solid var(--cor);
            padding: 20px;
            color: #fff;
            font-family: 'Cinzel';
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-buy:hover { background: var(--cor); color: #000; box-shadow: 0 0 30px var(--cor); }

        @keyframes flutuar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* =========================================
           RESPONSIVIDADE (CELULARES E TABLETS)
           ========================================= */
        @media (max-width: 1024px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto; /* Permite rolar a tela no celular */
                padding: 80px 15px 30px;
                justify-content: flex-start;
            }

            .btn-voltar {
                top: 15px;
                left: 15px;
                background: rgba(0, 0, 0, 0.6); /* Fundo para melhorar leitura em cima do vídeo */
                border-radius: 4px;
            }

            .titulo-forja h1 {
                font-size: 35px;
            }

            .menu-inventario {
                grid-template-columns: 1fr; /* Coloca o inventário em cima dos detalhes */
                height: auto;
            }

            .lista-itens {
                grid-template-columns: repeat(5, 1fr); /* 5 itens por linha em telas menores */
                max-height: 300px;
                padding: 15px;
            }

            .detalhes-reliquia {
                grid-template-columns: 1fr;
                padding: 30px 20px;
                text-align: center;
            }

            .info-container {
                border-left: none;
                border-top: 1px solid rgba(255,255,255,0.1);
                padding-left: 0;
                padding-top: 30px;
            }

            .circulo-ritual {
                width: 250px;
                height: 250px;
            }

            #img-principal {
                max-height: 220px;
            }
        }

        @media (max-width: 600px) {
            .titulo-forja h1 {
                font-size: 28px;
            }

            .lista-itens {
                grid-template-columns: repeat(4, 1fr); /* 4 itens por linha no celular */
            }

            h1#nome {
                font-size: 30px;
            }

            .stats-grid {
                text-align: left; /* Mantém os status alinhados corretamente */
            }
        }
    </style>
</head>
<body>

    <a href="produtos.html" class="btn-voltar">
        <i class="fa-solid fa-chevron-left"></i>
        <span>PRODUTOS</span>
    </a>

    <video autoplay muted loop class="video-bg">
        <source src="imagens/godofwar.mp4" type="video/mp4">
    </video>
    <div class="overlay-fundo"></div>

    <header class="titulo-forja">
        <h2>Santuário Ancestral</h2>
        <h1>Forja de Hephesto</h1>
    </header>

    <div class="menu-inventario">
        <div class="lista-itens" id="grid-itens"></div>

        <div class="detalhes-reliquia">
            <div class="visual-container">
                <div class="circulo-ritual"></div>
                <img src="" id="img-principal" alt="Relíquia">
            </div>

            <div class="info-container">
                <span class="raridade" id="tipo">NÍVEL: LENDÁRIO</span>
                <h1 id="nome">...</h1>
                
                <div class="stats-grid">
                    <div class="stat-bar">
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>ATAQUE</span><span id="txt-atk">0</span>
                        </div>
                        <div class="bar-bg"><div class="bar-fill" id="bar-atk"></div></div>
                    </div>
                    <div class="stat-bar" style="margin-top:15px;">
                        <div style="display:flex; justify-content:space-between; font-size:12px;">
                            <span>RÚNICO</span><span id="txt-mag">0</span>
                        </div>
                        <div class="bar-bg"><div class="bar-fill" id="bar-mag"></div></div>
                    </div>
                </div>

                <p class="desc" id="descricao" style="margin-bottom:20px; font-style:italic; color:#bbb;"></p>

                <button class="btn-buy" id="btn-forjar">FORJAR RELÍQUIA</button>
            </div>
        </div>
    </div>

    <script>
        const arsenal = [
            { id: 0, nome: "Leviathan Axe", atk: 88, mag: 95, desc: "Infundido com o gelo eterno de Niflheim.", img: "imagens/machado.jpg", cor: "#6fd6ff" },
            { id: 1, nome: "Blades of Chaos", atk: 98, mag: 70, desc: "Lâminas que queimam com o fogo do Hades.", img: "imagens/laminas.webp", cor: "#ff4d4d" },
            { id: 2, nome: "Guardian Shield", atk: 45, mag: 100, desc: "A defesa absoluta de Midgard.", img: "imagens/mimir.webp", cor: "#ffd700" },
            { id: 3, nome: "Draupnir Spear", atk: 92, mag: 80, desc: "Uma lança infinita que se multiplica.", img: "imagens/bustokleito.jpg", cor: "#c0c0c0" },
            { id: 4, nome: "Mjölnir", atk: 100, mag: 85, desc: "Esmaga com a força do trovão.", img: "imagens/martelo.jpg", cor: "#00eeff" },
            { id: 5, nome: "Tyrfing", atk: 90, mag: 90, desc: "Espada amaldiçoada que nunca erra.", img: "imagens/kratos2.jpg", cor: "#9400d3" },
            { id: 6, nome: "Talon Bow", atk: 60, mag: 85, desc: "Flechas rúnicas de Atreus.", img: "imagens/kratos4.webp", cor: "#32cd32" },
            { id: 7, nome: "Hilt of Skofnung", atk: 95, mag: 60, desc: "Invoca as almas de berserkers.", img: "imagens/kratos5.webp", cor: "#ff8c00" },
            { id: 8, nome: "Gungnir", atk: 99, mag: 95, desc: "A lança de Odin.", img: "imagens/kratos7.webp", cor: "#fffdd0" },
            { id: 9, nome: "Blade of Olympus", atk: 97, mag: 50, desc: "Punhos de aço esmagadores.", img: "imagens/blade.jpg", cor: "#b22222" }
        ];

        const grid = document.getElementById('grid-itens');
        
        // Variável para armazenar o nome da relíquia selecionada
        let reliquiaSelecionada = arsenal[0].nome;

        arsenal.forEach((p, index) => {
            const slot = document.createElement('div');
            slot.className = `item-slot ${index === 0 ? 'active' : ''}`; 
            slot.innerHTML = `<img src="${p.img}" alt="${p.nome}">`;
            slot.onclick = () => selecionarReliquia(index, slot);
            grid.appendChild(slot);
        });

        function selecionarReliquia(index, elemento) {
            const p = arsenal[index];
            
            // Atualiza a relíquia atual para o botão
            reliquiaSelecionada = p.nome;

            document.querySelectorAll('.item-slot').forEach(s => s.classList.remove('active'));
            elemento.classList.add('active');

            document.getElementById('nome').innerText = p.nome;
            document.getElementById('descricao').innerText = `"${p.desc}"`;
            document.getElementById('img-principal').src = p.img;
            document.getElementById('txt-atk').innerText = p.atk;
            document.getElementById('bar-atk').style.width = p.atk + "%";
            document.getElementById('txt-mag').innerText = p.mag;
            document.getElementById('bar-mag').style.width = p.mag + "%";

            document.documentElement.style.setProperty('--cor', p.cor);
            document.documentElement.style.setProperty('--brilho', p.cor + "66");
        }

        // LÓGICA DO BOTÃO FUNCIONAR
        document.getElementById('btn-forjar').onclick = function() {
            const numero = "55"; // COLOQUE SEU NÚMERO AQUI
            const mensagem = encodeURIComponent(`Saudações! Desejo forjar a relíquia lendária: ${reliquiaSelecionada}`);
            const url = `https://wa.me/${numero}?text=${mensagem}`;
            window.open(url, '_blank');
        };

        selecionarReliquia(0, document.querySelector('.item-slot'));
    </script>
</body>
</html>
