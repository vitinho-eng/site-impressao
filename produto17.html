<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney Experience - Universos Temáticos</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* ESTILOS GERAIS E RESET */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat';
            background: black;
            color: white;
            overflow-x: hidden;
            transition: background 0.5s ease, color 0.5s ease;
        }

        /* VIDEO DE FUNDO */
        video {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
            filter: brightness(.3);
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, transparent 10%, black 100%);
            z-index: -1;
        }

        /* BOTÃO DE SAÍDA PARA PRODUTOS.HTML */
        .btn-exit {
            position: fixed;
            top: 40px;
            right: 40px;
            padding: 12px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            font-weight: bold;
            font-size: 12px;
            z-index: 1000;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .btn-exit:hover {
            background: white;
            color: black;
            transform: scale(1.1);
        }

        /* CONTAINER DA PÁGINA INICIAL */
        .home-content {
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .center {
            text-align: center;
            margin-bottom: 60px;
            z-index: 2;
        }

        .center h1 {
            font-family: 'Cinzel';
            font-size: clamp(50px, 10vw, 100px);
            letter-spacing: 5px;
            text-shadow: 0 0 30px rgba(255,255,255,0.3);
        }

        /* NUVEM DE PORTAIS */
        .portals-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            max-width: 1400px;
            gap: 60px 20px;
        }

        .portal {
            position: relative;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 30px rgba(255,255,255,.1);
            border: 2px solid rgba(255,255,255,0.2);
            flex-shrink: 0;
        }

        /* Efeito de espalhamento */
        .portal:nth-child(4n+1) { margin-top: -30px; transform: scale(0.9); }
        .portal:nth-child(4n+2) { margin-top: 80px; transform: scale(1.1); }
        .portal:nth-child(4n+3) { margin-top: 20px; margin-left: 40px; }
        .portal:nth-child(4n+4) { margin-top: -50px; margin-right: 30px; transform: scale(0.85); }

        .portal img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(30%); transition: 0.5s; }
        .portal:hover { transform: scale(1.2) translateY(0) !important; box-shadow: 0 0 60px rgba(255, 255, 255, 0.6); z-index: 10; border-color: white; }
        .portal:hover img { filter: grayscale(0%); }

        .label {
            position: absolute;
            bottom: 0;
            width: 100%;
            text-align: center;
            font-size: 11px;
            background: rgba(0,0,0,0.8);
            padding: 8px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* ZOOM E MUNDO */
        .zoom {
            position: fixed;
            border-radius: 50%;
            z-index: 1000;
            transition: all .7s cubic-bezier(0.7, 0, 0.3, 1);
            pointer-events: none;
            display: none;
            overflow: hidden;
        }

        .world {
            position: fixed;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease;
            overflow-y: auto;
            padding-top: 140px;
            z-index: 500;
        }

        .world.active { opacity: 1; pointer-events: auto; }

        .world-header {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px;
            text-align: center;
            font-family: 'Cinzel';
            font-size: clamp(30px, 6vw, 45px);
            z-index: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 40px;
            max-width: 1200px;
            margin: auto;
        }

        /* CARDS */
        .card {
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card:hover { transform: translateY(-8px); }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .card h3 { padding: 20px 20px 5px; font-weight: 700; font-size: 18px; text-transform: capitalize; }
        .price { padding: 0 20px 20px; color: #aaa; font-size: 14px; }

        .buy {
            display: block;
            margin: 0 20px 25px;
            padding: 16px;
            text-align: center;
            color: black;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            transition: transform 0.2s ease;
        }

        .back {
            position: fixed;
            top: 40px; left: 40px;
            padding: 12px 25px;
            background: white;
            color: black;
            border: none;
            cursor: pointer;
            border-radius: 50px;
            font-weight: bold;
            font-size: 12px;
            z-index: 700;
        }
    </style>
</head>
<body>

/* --- MODELO PARA FUTURO UNIVERSO (Copie e Cole abaixo) ---
        "NOME DO MUNDO": {
            theme: { primary: "#COR_DO_TITULO", accent: "#COR_DO_BOTAO", cardBg: "#COR_DO_FUNDO" },
            items: [
                {img:"imagens/foto1.jpg", name:"Produto 1", price:"R$000"},
                {img:"imagens/foto2.jpg", name:"Produto 2", price:"R$000"},
                {img:"imagens/foto3.jpg", name:"Produto 3", price:"R$000"}
            ]
        },
        --------------------------------------------------------- */
    };

    function openWorld(e, name) {
        const rect = e.currentTarget.getBoundingClientRect();
        const worldData = data[name];
        if(!worldData) return;
        const theme = worldData.theme;
        
        body.style.background = theme.cardBg;
        body.style.color = theme.primary;

        zoom.style.display = "block";
        zoom.style.top = rect.top + "px";
        zoom.style.left = rect.left + "px";
        zoom.style.width = rect.width + "px";
        zoom.style.height = rect.height + "px";
        zoom.innerHTML = e.currentTarget.innerHTML;
        zoom.style.borderRadius = "50%";

        setTimeout(() => {
            zoom.style.top = "0"; zoom.style.left = "0";
            zoom.style.width = "100vw"; zoom.style.height = "100vh";
            zoom.style.borderRadius = "0";
        }, 10);

        setTimeout(() => {
            zoom.style.display = "none";
            home.style.display = "none";
            world.classList.add("active");
            
            title.innerText = name;
            title.style.color = theme.primary;
            title.style.background = `linear-gradient(to bottom, ${theme.cardBg} 80%, transparent)`;
            
            products.innerHTML = "";
            worldData.items.forEach(p => {
                const card = document.createElement("div");
                card.className = "card";
                card.style.borderColor = theme.accent + "44";
                card.style.background = theme.cardBg;

                card.onmouseover = () => {
                    card.style.borderColor = theme.primary;
                    card.style.boxShadow = `0 15px 30px ${theme.primary}33`;
                };
                card.onmouseout = () => {
                    card.style.borderColor = theme.accent + "44";
                    card.style.boxShadow = `0 10px 20px rgba(0,0,0,0.3)`;
                };

                card.innerHTML = `
                    <img src="${p.img}">
                    <h3 style="color: ${theme.primary}">${p.name}</h3>
                    <div class="price">${p.price}</div>
                    <a href="https://wa.me/5541999999999?text=Olá!%20Fiquei%20interessado%20no%20${p.name}" class="buy" style="background: ${theme.accent}">Comprar</a>
                `;
                products.appendChild(card);
            });
            window.scrollTo(0,0);
        }, 700);
    }

    function closeWorld() {
        world.classList.remove("active");
        home.style.display = "flex";
        body.style.background = "black";
        body.style.color = "white";
    }
</script>
